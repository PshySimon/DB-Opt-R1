# 合成维度定义
# 通过 瓶颈场景 × 负载类型 × 严重程度 × 硬件规格 的笛卡尔积，让 LLM 系统性生成 knob 配置
# 硬件规格对应真实机器，后续可在对应机器上验证

hardware:
  - name: 8c16g_hdd
    cpu_count: 8
    total_memory_gb: 16
    disk_type: HDD

  - name: 16c16g_hdd
    cpu_count: 16
    total_memory_gb: 16
    disk_type: HDD

  - name: 4c8g_ssd
    cpu_count: 4
    total_memory_gb: 8
    disk_type: SSD

workloads:
  - read_only
  - write_heavy
  - mixed
  - high_concurrency

severities:
  - mild        # 轻微偏移，±20% 左右
  - moderate    # 中度偏移，±50% 左右
  - severe      # 严重偏离，200%+ 或接近极值

data_volumes:
  - small       # 数据量 < 1GB，表少行少
  - medium      # 数据量 1-50GB，中等规模
  - large       # 数据量 50GB+，大表多索引

concurrent_loads:
  - low         # 1-10 并发连接
  - moderate    # 10-50 并发连接
  - high        # 50-200+ 并发连接

# ===== 场景模板 =====
# 每个场景定义：名称、类别、描述、涉及的 knob 方向
# LLM 会根据这些信息 + workload + severity 生成具体的 knob 值

scenarios:

  # ========== 一、单瓶颈场景 (32) ==========

  # --- memory (5) ---
  - name: low_shared_buffers
    category: memory
    severity_varies: true
    description: "shared_buffers 配置偏低（256MB-1GB），远低于推荐的 25% RAM（4GB），导致缓冲池命中率低，频繁磁盘读取"
    key_knobs:
      shared_buffers: {direction: low, range: "256MB-1GB"}

  - name: low_work_mem_spill
    category: memory
    severity_varies: true
    description: "work_mem 仅 1-2MB，排序和哈希操作频繁溢写到临时文件，temp_files 数量多"
    key_knobs:
      work_mem: {direction: low, range: "1MB-2MB"}

  - name: cache_size_mismatch
    category: memory
    severity_varies: true
    description: "effective_cache_size 设置远低于实际可用内存（512MB-2GB vs 实际~12GB），优化器低估缓存能力，偏向顺序扫描"
    key_knobs:
      effective_cache_size: {direction: low, range: "512MB-2GB"}

  - name: low_maintenance_mem
    category: memory
    severity_varies: true
    description: "maintenance_work_mem 仅 16-32MB，VACUUM 和 CREATE INDEX 操作效率低"
    key_knobs:
      maintenance_work_mem: {direction: low, range: "16MB-32MB"}

  - name: oversized_shared_buffers
    category: memory
    severity_varies: true
    description: "shared_buffers 占 RAM 40-50%（6-8GB），挤压操作系统页面缓存，双重缓存效率低"
    key_knobs:
      shared_buffers: {direction: high, range: "6GB-8GB"}

  # --- optimizer (6) ---
  - name: seq_scan_bias
    category: optimizer
    severity_varies: true
    description: "random_page_cost 偏高（7-10），优化器过度偏向顺序扫描，即使有合适的索引也不使用"
    key_knobs:
      random_page_cost: {direction: high, range: "7-10"}

  - name: index_scan_bias
    category: optimizer
    severity_varies: true
    description: "random_page_cost 偏低（0.5-1.5，SSD 值），在 HDD 上不合理，优化器过度偏向索引扫描"
    key_knobs:
      random_page_cost: {direction: low, range: "0.5-1.5"}

  - name: coarse_statistics
    category: optimizer
    severity_varies: true
    description: "default_statistics_target 仅 10-20（默认100），统计直方图粗糙，行数估计偏差大"
    key_knobs:
      default_statistics_target: {direction: low, range: "10-20"}

  - name: join_plan_explosion
    category: optimizer
    severity_varies: true
    description: "join_collapse_limit 和 from_collapse_limit 设为 15-20，多表 JOIN 时优化器穷举空间爆炸，planning time 很长"
    key_knobs:
      join_collapse_limit: {direction: high, range: "15-20"}
      from_collapse_limit: {direction: high, range: "15-20"}

  - name: no_join_reorder
    category: optimizer
    severity_varies: true
    description: "join_collapse_limit=1-2, from_collapse_limit=1-2，禁用 JOIN 重排优化，查询计划可能严重次优"
    key_knobs:
      join_collapse_limit: {direction: low, range: "1-2"}
      from_collapse_limit: {direction: low, range: "1-2"}

  - name: cpu_cost_distortion
    category: optimizer
    severity_varies: true
    description: "cpu_tuple_cost 与 cpu_index_tuple_cost 比例异常（如 0.05 vs 0.001），优化器对行处理和索引的代价判断失衡"
    key_knobs:
      cpu_tuple_cost: {direction: high, range: "0.05-0.1"}
      cpu_index_tuple_cost: {direction: low, range: "0.001-0.002"}

  # --- wal (4) ---
  - name: checkpoint_storm
    category: wal
    severity_varies: true
    description: "max_wal_size 仅 128-256MB + checkpoint_timeout 仅 30-60s，checkpoint 极其频繁，IO 被写回占满"
    key_knobs:
      max_wal_size: {direction: low, range: "128MB-256MB"}
      checkpoint_timeout: {direction: low, range: "30-60"}

  - name: wal_write_bottleneck
    category: wal
    severity_varies: true
    description: "synchronous_commit=on + wal_buffers 仅 1-2MB + commit_delay 高（50000-100000μs），WAL 写入成为事务提交瓶颈"
    key_knobs:
      synchronous_commit: {value: "on"}
      wal_buffers: {direction: low, range: "1MB-2MB"}
      commit_delay: {direction: high, range: "50000-100000"}

  - name: checkpoint_spike
    category: wal
    severity_varies: true
    description: "checkpoint_completion_target 仅 0.1-0.2，checkpoint 写入不分散，IO 尖峰明显"
    key_knobs:
      checkpoint_completion_target: {direction: low, range: "0.1-0.2"}

  - name: wal_space_waste
    category: wal
    severity_varies: true
    description: "max_wal_size=3-4GB + min_wal_size=512MB-1GB，WAL 文件占用大量 HDD 磁盘空间"
    key_knobs:
      max_wal_size: {direction: high, range: "3GB-4GB"}
      min_wal_size: {direction: high, range: "512MB-1GB"}

  # --- vacuum (4) ---
  - name: autovacuum_disabled
    category: vacuum
    severity_varies: true
    description: "autovacuum=off，死元组无法被清理，表膨胀严重，事务 ID wraparound 风险"
    key_knobs:
      autovacuum: {value: "off"}

  - name: vacuum_too_lazy
    category: vacuum
    severity_varies: true
    description: "vacuum_scale_factor=0.3-0.5 + vacuum_threshold=2000-5000，几乎不触发自动清理"
    key_knobs:
      autovacuum_vacuum_scale_factor: {direction: high, range: "0.3-0.5"}
      autovacuum_vacuum_threshold: {direction: high, range: "2000-5000"}

  - name: vacuum_too_aggressive
    category: vacuum
    severity_varies: true
    description: "vacuum_scale_factor=0.01-0.02 + naptime=1-5s，autovacuum 过于频繁，占用 IO 和 CPU"
    key_knobs:
      autovacuum_vacuum_scale_factor: {direction: low, range: "0.01-0.02"}
      autovacuum_naptime: {direction: low, range: "1-5"}

  - name: analyze_stale
    category: vacuum
    severity_varies: true
    description: "analyze_threshold=2000-5000 + analyze_scale_factor=0.3-0.5，统计信息长期不更新"
    key_knobs:
      autovacuum_analyze_threshold: {direction: high, range: "2000-5000"}
      autovacuum_analyze_scale_factor: {direction: high, range: "0.3-0.5"}

  # --- parallel (3) ---
  - name: parallel_disabled
    category: parallel
    severity_varies: true
    description: "max_parallel_workers_per_gather=0 + max_parallel_workers=0，完全禁用并行查询，8 核 CPU 利用率极低"
    key_knobs:
      max_parallel_workers_per_gather: {value: 0}
      max_parallel_workers: {value: 0}

  - name: parallel_underused
    category: parallel
    severity_varies: true
    description: "max_parallel_workers_per_gather=1 + max_parallel_workers=2，8 核机器并行度严重不足"
    key_knobs:
      max_parallel_workers_per_gather: {value: 1}
      max_parallel_workers: {value: 2}

  - name: parallel_greedy
    category: parallel
    severity_varies: true
    description: "max_parallel_workers_per_gather=5-7，单查询占用大部分 CPU，其他并发查询被饿死"
    key_knobs:
      max_parallel_workers_per_gather: {direction: high, range: "5-7"}

  # --- bgwriter (2) ---
  - name: bgwriter_lazy
    category: bgwriter
    severity_varies: true
    description: "bgwriter_delay=1500-2000ms + bgwriter_lru_maxpages=10-20，bgwriter 太懒，脏页堆积，backend 被迫自己写"
    key_knobs:
      bgwriter_delay: {direction: high, range: "1500-2000"}
      bgwriter_lru_maxpages: {direction: low, range: "10-20"}

  - name: bgwriter_overactive
    category: bgwriter
    severity_varies: true
    description: "bgwriter_delay=10-20ms + bgwriter_lru_maxpages=800-1000 + multiplier=8-10，bgwriter 过度活跃，抢占 IO 带宽"
    key_knobs:
      bgwriter_delay: {direction: low, range: "10-20"}
      bgwriter_lru_maxpages: {direction: high, range: "800-1000"}
      bgwriter_lru_multiplier: {direction: high, range: "8-10"}

  # --- connections (3) ---
  - name: too_many_connections
    category: connections
    severity_varies: true
    description: "max_connections=300-500，8c16g 机器上每个连接占 ~10MB，总内存压力大"
    key_knobs:
      max_connections: {direction: high, range: "300-500"}

  - name: too_few_connections
    category: connections
    severity_varies: true
    description: "max_connections=10-15，应用连接不足，请求排队"
    key_knobs:
      max_connections: {direction: low, range: "10-15"}

  - name: idle_connection_leak
    category: connections
    severity_varies: true
    description: "idle_in_transaction_session_timeout=0（不超时）+ max_connections=200-300，空闲连接堆积占用资源"
    key_knobs:
      idle_in_transaction_session_timeout: {value: 0}
      max_connections: {direction: high, range: "200-300"}

  # --- locks (2) ---
  - name: slow_deadlock_detection
    category: locks
    severity_varies: true
    description: "deadlock_timeout=5000-10000ms，死锁检测延迟，事务长时间阻塞"
    key_knobs:
      deadlock_timeout: {direction: high, range: "5000-10000"}

  - name: frequent_deadlock_check
    category: locks
    severity_varies: true
    description: "deadlock_timeout=100-200ms，死锁检测过于频繁，CPU 开销增加"
    key_knobs:
      deadlock_timeout: {direction: low, range: "100-200"}

  # --- other (3) ---
  - name: monitoring_disabled
    category: stats
    severity_varies: true
    description: "track_activities=off + track_counts=off，监控和统计收集完全关闭"
    key_knobs:
      track_activities: {value: "off"}
      track_counts: {value: "off"}

  - name: geqo_too_early
    category: optimizer
    severity_varies: true
    description: "geqo_threshold=2-4（默认12），极少量表就触发遗传算法，计划质量下降"
    key_knobs:
      geqo_threshold: {direction: low, range: "2-4"}

  - name: wrong_io_concurrency
    category: parallel
    severity_varies: true
    description: "effective_io_concurrency=150-200（SSD 值），在 HDD 上预读请求过多，IO 队列堵塞"
    key_knobs:
      effective_io_concurrency: {direction: high, range: "150-200"}

  # ========== 二、组合瓶颈场景 (8) ==========

  - name: memory_plus_checkpoint
    category: combo
    severity_varies: true
    description: "shared_buffers 偏低 + max_wal_size 小 + checkpoint 频繁，内存和 IO 双重压力"
    key_knobs:
      shared_buffers: {direction: low, range: "256MB-512MB"}
      max_wal_size: {direction: low, range: "128MB-256MB"}
      checkpoint_timeout: {direction: low, range: "30-60"}

  - name: seqscan_no_parallel
    category: combo
    severity_varies: true
    description: "random_page_cost 偏高导致全表扫描 + 并行完全禁用，大表查询极慢"
    key_knobs:
      random_page_cost: {direction: high, range: "7-10"}
      max_parallel_workers_per_gather: {value: 0}

  - name: vacuum_off_low_mem
    category: combo
    severity_varies: true
    description: "autovacuum 禁用 + maintenance_work_mem 极低 + shared_buffers 偏低，表膨胀且无法高效清理"
    key_knobs:
      autovacuum: {value: "off"}
      maintenance_work_mem: {direction: low, range: "16MB-32MB"}
      shared_buffers: {direction: low, range: "256MB-512MB"}

  - name: high_conn_low_mem
    category: combo
    severity_varies: true
    description: "max_connections=400 + shared_buffers 偏低 + work_mem=1MB，大量连接但每连接可用资源极少"
    key_knobs:
      max_connections: {direction: high, range: "300-400"}
      shared_buffers: {direction: low, range: "256MB-512MB"}
      work_mem: {direction: low, range: "1MB-2MB"}

  - name: write_heavy_wal_bottleneck
    category: combo
    severity_varies: true
    description: "bgwriter 太慢 + 同步提交 + WAL 空间小，写入密集场景全面瓶颈"
    key_knobs:
      bgwriter_delay: {direction: high, range: "1500-2000"}
      synchronous_commit: {value: "on"}
      max_wal_size: {direction: low, range: "128MB-256MB"}

  - name: stats_stale_vacuum_lazy
    category: combo
    severity_varies: true
    description: "statistics_target 过低 + analyze 不及时，优化器用过时统计信息选择劣质计划"
    key_knobs:
      default_statistics_target: {direction: low, range: "10-20"}
      autovacuum_analyze_threshold: {direction: high, range: "3000-5000"}

  - name: low_mem_bad_join
    category: combo
    severity_varies: true
    description: "work_mem 极低导致排序溢写 + JOIN 不重排导致计划次优"
    key_knobs:
      work_mem: {direction: low, range: "1MB-2MB"}
      join_collapse_limit: {direction: low, range: "1-2"}

  - name: checkpoint_bgwriter_conflict
    category: combo
    severity_varies: true
    description: "checkpoint 极频繁 + bgwriter 极活跃，两者同时大量写入 HDD，IO 完全饱和"
    key_knobs:
      checkpoint_timeout: {direction: low, range: "30-60"}
      bgwriter_delay: {direction: low, range: "10-20"}
      bgwriter_lru_maxpages: {direction: high, range: "800-1000"}

  # ========== 三、应用场景模板 (6) ==========

  - name: oltp_high_concurrency
    category: application
    severity_varies: true
    description: "OLTP 高并发场景：大量短事务点查，需要足够连接数和合理的内存分配"
    key_knobs:
      max_connections: {direction: moderate_high, range: "200-300"}
      work_mem: {direction: low, range: "2MB-4MB"}
      shared_buffers: {direction: moderate, range: "2GB-4GB"}

  - name: batch_etl_import
    category: application
    severity_varies: true
    description: "批量 ETL 导入场景：大量 COPY/INSERT，WAL 和 checkpoint 配置是关键"
    key_knobs:
      max_wal_size: {direction: high, range: "2GB-4GB"}
      checkpoint_timeout: {direction: high, range: "900-3600"}
      max_parallel_maintenance_workers: {direction: high, range: "4-6"}

  - name: report_analytics
    category: application
    severity_varies: true
    description: "报表分析场景：大表 JOIN + 聚合，需要大 work_mem 和高并行度"
    key_knobs:
      work_mem: {direction: high, range: "64MB-256MB"}
      max_parallel_workers_per_gather: {direction: high, range: "4-6"}
      effective_cache_size: {direction: high, range: "10GB-12GB"}

  - name: mixed_htap
    category: application
    severity_varies: true
    description: "混合 HTAP 场景：OLTP 和分析查询并存，各参数需要折中配置"
    key_knobs:
      shared_buffers: {direction: moderate, range: "3GB-4GB"}
      work_mem: {direction: moderate, range: "16MB-32MB"}
      max_parallel_workers_per_gather: {direction: moderate, range: "2-3"}

  - name: heavy_update_delete
    category: application
    severity_varies: true
    description: "重更新/删除场景：UPDATE/DELETE 密集，VACUUM 需要积极配置"
    key_knobs:
      autovacuum_naptime: {direction: low, range: "10-20"}
      autovacuum_vacuum_scale_factor: {direction: low, range: "0.02-0.05"}
      bgwriter_delay: {direction: moderate, range: "100-200"}

  - name: mixed_long_short_txn
    category: application
    severity_varies: true
    description: "长短事务混合场景：长事务持锁阻塞短事务，锁超时策略很重要"
    key_knobs:
      lock_timeout: {direction: moderate, range: "5000-15000"}
      idle_in_transaction_session_timeout: {direction: moderate, range: "30000-60000"}
      deadlock_timeout: {direction: moderate, range: "1000-2000"}

  # ========== 四、反模式场景 (8) ==========

  - name: antipattern_all_defaults
    category: antipattern
    severity_varies: false
    description: "云厂商默认配置不改：所有 knob 保持出厂默认值，16GB RAM 完全没有利用"
    key_knobs:
      shared_buffers: {value: "128MB"}
      work_mem: {value: "4MB"}
      effective_cache_size: {value: "4GB"}

  - name: antipattern_max_everything
    category: antipattern
    severity_varies: false
    description: "盲目调大所有参数：shared_buffers=8GB + work_mem=512MB + max_connections=500，内存总量远超物理内存"
    key_knobs:
      shared_buffers: {value: "8GB"}
      work_mem: {value: "512MB"}
      max_connections: {value: 500}

  - name: antipattern_prod_on_dev
    category: antipattern
    severity_varies: false
    description: "照搬高配参数到低配硬件：shared_buffers=8GB + max_parallel=16 + maintenance_work_mem=2GB"
    key_knobs:
      shared_buffers: {value: "8GB"}
      max_parallel_workers: {value: 16}
      maintenance_work_mem: {value: "2GB"}

  - name: antipattern_ssd_on_hdd
    category: antipattern
    severity_varies: false
    description: "HDD 机器使用 SSD 参数：random_page_cost=0.5 + effective_io_concurrency=200"
    key_knobs:
      random_page_cost: {value: 0.5}
      effective_io_concurrency: {value: 200}
      seq_page_cost: {value: 0.5}

  - name: antipattern_over_defensive
    category: antipattern
    severity_varies: false
    description: "过度防御配置：所有超时都设得极短，正常请求也可能被超时截断"
    key_knobs:
      lock_timeout: {value: 500}
      deadlock_timeout: {value: 100}
      idle_in_transaction_session_timeout: {value: 5000}

  - name: antipattern_copy_blog
    category: antipattern
    severity_varies: false
    description: "照抄网上 PG 优化指南的通用建议：shared_buffers=4GB, work_mem=64MB 看似合理，但 random_page_cost=1.1 不适合 HDD"
    key_knobs:
      shared_buffers: {value: "4GB"}
      work_mem: {value: "64MB"}
      random_page_cost: {value: 1.1}

  - name: antipattern_mem_only
    category: antipattern
    severity_varies: false
    description: "只调内存不调优化器：shared_buffers=4GB + work_mem=32MB 合理，但优化器参数全默认"
    key_knobs:
      shared_buffers: {value: "4GB"}
      work_mem: {value: "32MB"}

  - name: antipattern_conflicting
    category: antipattern
    severity_varies: false
    description: "参数冲突：synchronous_commit=off（追求速度）但 checkpoint_timeout=30s + max_wal_size=128MB（频繁刷盘），目的矛盾"
    key_knobs:
      synchronous_commit: {value: "off"}
      checkpoint_timeout: {value: 30}
      max_wal_size: {value: "128MB"}

  # ========== 五、边界条件 (4) ==========

  - name: boundary_single_tweak
    category: boundary
    severity_varies: false
    description: "全默认只微调一个关键参数（如 shared_buffers=2GB），测试模型对单变量的敏感度"
    key_knobs:
      shared_buffers: {value: "2GB"}

  - name: boundary_all_max
    category: boundary
    severity_varies: false
    description: "所有内存类 knob 推到最大值，测试极限边界行为"
    key_knobs:
      shared_buffers: {value: "8GB"}
      work_mem: {value: "1GB"}
      effective_cache_size: {value: "32GB"}
      maintenance_work_mem: {value: "2GB"}

  - name: boundary_minimal
    category: boundary
    severity_varies: false
    description: "所有 knob 推到最小值，PG 刚好能启动和运行"
    key_knobs:
      shared_buffers: {value: "32MB"}
      work_mem: {value: "1MB"}
      max_connections: {value: 10}

  - name: boundary_textbook_optimal
    category: boundary
    severity_varies: false
    description: "8c16g HDD 的 DBA 教科书推荐配置：shared_buffers=4GB, effective_cache_size=12GB, work_mem=16MB, random_page_cost=4.0"
    key_knobs:
      shared_buffers: {value: "4GB"}
      effective_cache_size: {value: "12GB"}
      work_mem: {value: "16MB"}
      random_page_cost: {value: 4.0}
      checkpoint_completion_target: {value: 0.9}
      max_parallel_workers_per_gather: {value: 4}

  # ========== 六、最佳配置场景 (8) ==========
